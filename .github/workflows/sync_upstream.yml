name: Sync Upstream Dev

on:
  workflow_dispatch:
  schedule:
    - cron: "30 18 * * *"

permissions:
  contents: write

concurrency:
  group: sync-upstream-dev
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream dev
        run: |
          git remote add upstream https://github.com/Sesame-AG/Sesame-AG.git
          git fetch upstream dev --tags

      - name: Merge upstream dev
        run: |
          git merge --no-edit upstream/dev

      - name: Push main
        run: |
          git push origin HEAD:main
